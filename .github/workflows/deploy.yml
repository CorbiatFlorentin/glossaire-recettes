name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'production'
        type: choice
        options:
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  # ─── Build Frontend ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build — Frontend
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.set-artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_APP_ENV: production
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Set artifact name
        id: set-artifact
        run: echo "name=frontend-build-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact.outputs.name }}
          path: frontend/dist/
          retention-days: 1

  # ─── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build-frontend]
    environment:
      name: production
      url: ${{ steps.deploy-front.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-frontend.outputs.artifact-name }}
          path: frontend/dist/

      # Frontend → Vercel
      - name: Deploy frontend to Vercel
        id: deploy-front
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
          vercel-args: '--prod'
          working-directory: frontend/dist/

      # Backend → Render (auto-déployé depuis GitHub, trigger manuel via deploy hook)
      - name: Trigger Render backend deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
