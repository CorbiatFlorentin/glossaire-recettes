version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: recipe_db
    environment:
      POSTGRES_USER: recipe_user
      POSTGRES_PASSWORD: recipe_pass
      POSTGRES_DB: recipe_app
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Optional: pgAdmin for DB inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: recipe_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@recipe.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - tools

volumes:
  pg_data: